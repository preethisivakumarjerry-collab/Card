<!DOCTYPE html>
<html lang="en">
<head>
  <title>Portfolio</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <!-- Bootstrap -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;600&family=Cinzel:wght@600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Poppins', sans-serif;
      transition: 0.4s;
    }

    /* DARK */
    body.dark {
      background: linear-gradient(135deg, #141e30, #243b55);
    }

    /* LIGHT */
    body.light {
      background: #f4f6f9;
    }

    .card {
      width: 350px;
      border-radius: 20px;
      overflow: hidden;
      border: none;
      transition: 0.4s;
      animation: fadeIn 1s ease;
    }

    .card:hover {
      transform: translateY(-10px);
    }

    .card-header {
      background: linear-gradient(45deg, gold, #ffcc00);
      text-align: center;
      padding: 25px;
      color: #000;
      box-shadow: 0 0 15px gold;
    }

    .profile-img {
      width: 90px;
      border-radius: 50%;
      border: 4px solid #fff;
      margin-bottom: 10px;
    }

    .name {
      font-family: 'Cinzel', serif;
      font-size: 20px;
      font-weight: bold;
    }

    .card-body {
      background: #1e1e2f;
      color: #fff;
      text-align: center;
      padding: 20px;
    }

    body.light .card-body {
      background: #fff;
      color: #333;
    }

    /* SOCIAL */
    .social a {
      margin: 10px;
      font-size: 18px;
      color: #ccc;
      transition: 0.3s;
    }

    .social a:hover {
      color:rgb(9, 143, 143);
      transform: scale(1.3);
    }

    /* BUTTON */
    .btn-custom {
      margin-top: 10px;
      border-radius: 25px;
      background: gold;
      color: #000;
      border: none;
      transition: 0.3s;
    }

    .btn-custom:hover {
      box-shadow: 0 0 15px gold;
      transform: scale(1.1);
    }

    /* EXTRA CONTENT */
    .extra {
      display: none;
      margin-top: 15px;
      font-size: 13px;
    }

    /* TOGGLE BTN */
    .toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      border-radius: 25px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }

  </style>
</head>

<body class="dark" id="body">

<!-- THEME TOGGLE -->
<button class="btn btn-warning toggle" onclick="toggleTheme()">🌙</button>

<div class="card">

  <div class="card-header">
    <img src="photo image.avif" class="profile-img">
    <div class="name">PREETHI SIVA KUMAR</div>
    <div>Web Developer</div>
  </div>

  <div class="card-body">

    <p>UI/UX Designer & Web Developer</p>

    <!-- SOCIAL -->
    <div class="social">
      <a href="https://www.linkedin.com/in/preethi-siva-kumar-b08854377" target="_blank"><i class="fab fa-linkedin"></i></a>
      <a href="https://www.hackerrank.com/profile/preethisivakum13" target="_blank"><i class="fab fa-hackerrank"></i></a>
      <a href="https://instagram.com" target="_blank"><i class="fab fa-instagram"></i></a>
      <a href="https://github.com/preethisivakumarjerry-collab" target="_blank"><i class="fab fa-github"></i></a>
    </div>

    <!-- BUTTON -->
    <button class="btn btn-custom" onclick="showMore()">View Details 👑</button>

    <!-- EXTRA INFO -->
    <div class="extra" id="extra">
      <p><b>Skills:</b> HTML, CSS, Bootstrap, JS, C</p>
      <p><b>Goal:</b> Become a professional full-stack developer</p>
    </div>

  </div>

</div>

<script>
function toggleTheme() {
  let body = document.getElementById("body");

  if(body.classList.contains("dark")) {
    body.classList.remove("dark");
    body.classList.add("light");
  } else {
    body.classList.remove("light");
    body.classList.add("dark");
  }
}

function showMore() {
  let extra = document.getElementById("extra");

  if(extra.style.display === "block") {
    extra.style.display = "none";
  } else {
    extra.style.display = "block";
  }
}
</script>

</body>
</html>
